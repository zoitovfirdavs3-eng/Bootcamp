<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1-month | EXAM</title>
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <!-- Movies Listni render qilish kerak ya'ni HTML taglari shu yerda yoziladi  -->
    <h1 class="heading">🎬 Movies</h1>
    <template class="js-temp">
      <li>
        <img src="" alt="" />
        <h3></h3>
        <p></p>
        <h4></h4>
      </li>
    </template>
    
    <form class="js-form">
      <input
        class="js-name-inp"
        type="text"
        placeholder="Search by movie name"
      />
      <select class="js-select">
        <option value="" selected disabled hidden>Kino janrini tanlang</option>
        <option value="All">All</option>
        <option value="Action">Action</option>
        <option value="Comedy">Comedy</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Adventure">Adventure</option>
        <option value="Science Fiction">Science Fiction</option>
        <option value="Thriller">Thriller</option>
        <option value="Horror">Horror</option>
        <option value="Animation">Animation</option>
        <option value="Family">Family</option>
        <option value="Documentary">Documentary</option>
        <option value="Mystery">Mystery</option>
        <option value="Drama">Drama</option>
        <option value="TV Movie">TV Movie</option>
        <option value="Music">Music</option>
        <option value="Crime">Crime</option>
        <option value="History">History</option>
        <option value="Romance">Romance</option>
      </select>
      <button class="css-button">Search</button>
    </form>


    <ul class="js-movies-list"></ul>

    <script src="./films.js"></script>
    <script src="./main.js"></script>
    <script src="./tasks.js"></script>
  </body>
</html>
