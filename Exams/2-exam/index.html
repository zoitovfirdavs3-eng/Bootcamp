<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Books</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body>

  <header>
    <div class="navbar">
      <div class="logo">
        <img src="icons/book-icon.svg" alt="Book icon">
        <span>Online books</span>
      </div>

      <ul class="nav-links">
        <li>
          <a class="js-bookmark-link" href="#">
            <img src="icons/star.svg" alt="Bookmark" class="bookmark-nav-icon">
            Bookmark (<span class="js-bookmark-count">0</span>)
          </a>
        </li>
      </ul>
    </div>
  </header>


  <form class="js-form">
    <section class="search-section">
      <div class="search-container">

        <div class="top-search">
          <input class="js-search-inp" id="search" name="search" type="text" placeholder="Search" />
          <button type="submit">Search</button>
        </div>

        <div class="filter-by-letters">
          <select class="js-sort-select" id="sort" name="sort">
            <option value="az">A-Z</option>
            <option value="za">Z-A</option>
            <option value="old-year">Eng eski</option>
            <option value="new-year">Eng yangi</option>
          </select>

          <input class="js-min-year-inp" id="minYear" name="minYear" type="number" placeholder="Min yil" />
          <input class="js-max-year-inp" id="maxYear" name="maxYear" type="number" placeholder="Max yil" />

          <input class="js-author-inp" id="author" name="author" type="text" placeholder="Search Author" />

          <select class="js-country-select" id="country" name="country">
            <option value="all">All</option>
          </select>
        </div>

      </div>
    </section>
  </form>


  <div class="main-content">
    <section class="books-container js-book-list"></section>

    <ul class="js-bookmark-list">
      <h2>Bookmarked Books</h2>
    </ul>
  </div>


  <template class="js-book-temp">
    <div class="book-card" tabindex="0">

      <img
        class="book-img js-book-image"
        src="https://covers.openlibrary.org/b/id/10253683-L.jpg"
        alt="Book Cover"
      />

      <h2 class="book-title js-book-title"></h2>

      <p class="author">
        <img src="icons/author.svg" alt="Author" />
        <span class="js-book-author"></span>
      </p>

      <div class="book-info">
        <div class="info-item">
          <img src="icons/year.svg" alt="Year" />
          <span class="year js-book-year"></span>
        </div>
        <div class="info-item">
          <img src="icons/pages.svg" alt="Pages" />
          <span class="pages js-book-pages"></span>
        </div>
        <div class="info-item">
          <img src="icons/language.svg" alt="Language" />
          <span class="language js-book-language"></span>
        </div>
      </div>

      <div class="book-links">
        <a class="wiki-link js-about-link" href="#" target="_blank">Wikipedia</a>
        <img class="js-bookmark" src="/icons/star-border.svg" alt="Bookmark" />
      </div>

    </div>
  </template>


  <template class="js-bookmark-temp">
    <li class="bookmark-item">
      <div class="bookmark-box">

        <img
          class="book-img js-book-image"
          src="https://covers.openlibrary.org/b/id/10253683-L.jpg"
          alt="Book Cover"
        />

        <h2 class="book-title js-book-title"></h2>

        <p class="author">
          <img src="icons/author.svg" alt="Author" />
          <span class="js-book-author"></span>
        </p>

        <div class="book-info">
          <div class="info-item">
            <img src="icons/year.svg" alt="Year" />
            <span class="year js-book-year"></span>
          </div>
          <div class="info-item">
            <img src="icons/pages.svg" alt="Pages" />
            <span class="pages js-book-pages"></span>
          </div>
          <div class="info-item">
            <img src="icons/language.svg" alt="Language" />
            <span class="language js-book-language"></span>
          </div>
        </div>

        <div class="book-links">
          <a class="wiki-link js-about-link" href="#" target="_blank">Wikipedia</a>
          <button type="button" class="js-remove-btn">Delete</button>
        </div>

      </div>
    </li>
  </template>


  <script src="js/books.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
